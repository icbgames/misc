<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>beatmania IIDX ☆12 クリアランプ比較</title>
<style>
body { font-size: 12px; margin: 0; padding: 1em; }
table { font-size: 12px; border-collapse: collapse; margin: 0.5em 0; }
th, td { border: 1px solid #000; padding: 0.3em 0.5em; text-align: center; }
th { background-color: #c8c8e8; }
.player {
  width: 6em;
}
.music {
  font-size: 90%;
  text-align: left;
  max-width: 16em;
  overflow-x: hidden;
  padding: 0 1em;
}
.fc     { background-color: orange; }
.exh    { background-color: yellow; }
.hc     { background-color: #ff6666; }
.c      { background-color: cyan; }
.ec     { background-color: lightgreen; }
.ac     { background-color: #eebbff; }
.np     { background-color: white; }
.failed { background-color: #e0e0e0; }
.accordion-header { cursor: pointer; background-color: #f0f0f0; padding: 0.5em; border: 1px solid #ccc; margin-bottom: 0.5em; }
.accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.accordion-content.open { max-height: 1000px; } /* adjust as needed */
@media (max-width: 768px) {
  body { font-size: 10px; padding: 0.5em; }
  table { font-size: 10px; }
  th, td { padding: 0.2em 0.3em; }
  .music { max-width: 10em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #compareArea table { width: 100%; overflow-x: auto; display: block; }
  #compareArea thead th { position: sticky; top: 0; background-color: #b8b8b8; z-index: 1; }
}
</style>
</head>
<body>
<div class="accordion-header" id="accordionHeader">ユーザー選択 ▼</div>
<div class="accordion-content open" id="accordionContent">
<div>
  <input type="text" id="userIdInput" placeholder="ユーザーID" />
  <button id="fetchButton">データ取得</button>
</div>
<table id="userList">
  <thead>
    <tr><th></th><th>名前</th><th>CPI</th><th></th>更新日時</th><th>操作</th></tr>
  </thead>
  <tbody></tbody>
</table>
</div>
<button id="compareButton">比較</button>
<div id="compareArea"></div>

<script>
(function() {
  const endpointBase = 'https://pupu-formula.ssl-lolipop.jp/iidx/get.php?id=';

  // load & render
  function getStoredUsers() {
    const users = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('user_')) {
        try {
          users.push(JSON.parse(localStorage.getItem(key)));
        } catch (e) {
          // ignore malformed
        }
      }
    }
    return users;
  }

  function getCheckedUsers() {
    try {
      return JSON.parse(localStorage.getItem('checked_users') || '[]');
    } catch (e) {
      return [];
    }
  }

  function saveCheckedUsers(ids) {
    localStorage.setItem('checked_users', JSON.stringify(ids));
  }

  function toggleAccordion(open) {
    const content = document.getElementById('accordionContent');
    const header = document.getElementById('accordionHeader');
    if (open) {
      content.classList.add('open');
      header.textContent = 'ユーザー選択 ▲';
    } else {
      content.classList.remove('open');
      header.textContent = 'ユーザー選択 ▼';
    }
  }

  function renderUserList() {
    const tbody = document.querySelector('#userList tbody');
    tbody.innerHTML = '';
    const users = getStoredUsers();
    users.sort((a,b)=>a.id - b.id);
    const checkedUsers = getCheckedUsers();
    users.forEach(user => {
      const tr = document.createElement('tr');
      const cbTd = document.createElement('td');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.dataset.id = user.id;
      cb.checked = checkedUsers.includes(user.id.toString());
      cb.addEventListener('change', () => {
        const currentChecked = getCheckedUsers();
        if (cb.checked) {
          if (currentChecked.length >= 6) {
            alert('比較できるユーザーは最大6人までです');
            cb.checked = false;
            return;
          }
          currentChecked.push(user.id.toString());
        } else {
          const idx = currentChecked.indexOf(user.id.toString());
          if (idx > -1) currentChecked.splice(idx, 1);
        }
        saveCheckedUsers(currentChecked);
      });
      cbTd.appendChild(cb);
      tr.appendChild(cbTd);

      const nameTd = document.createElement('td');
      nameTd.textContent = user.name || '(不明)';
      tr.appendChild(nameTd);

      const cpiTd = document.createElement('td');
      cpiTd.textContent = user.cpi || 0;
      tr.appendChild(cpiTd);

      const updatedTd = document.createElement('td');
      updatedTd.textContent = user.updated || '';
      tr.appendChild(updatedTd);

      const actionTd = document.createElement('td');
      const updBtn = document.createElement('button');
      updBtn.textContent = '更新';
      updBtn.addEventListener('click', () => {
        fetchAndStore(user.id);
      });
      actionTd.appendChild(updBtn);

      const delBtn = document.createElement('button');
      delBtn.textContent = '削除';
      delBtn.addEventListener('click', () => {
        if (confirm('ユーザー ' + (user.name || user.id) + ' を削除しますか？')) {
          localStorage.removeItem('user_' + user.id);
          renderUserList();
        }
      });
      actionTd.appendChild(delBtn);

      tr.appendChild(actionTd);

      tbody.appendChild(tr);
    });
  }

  function fetchAndStore(id) {
    // first hit the update endpoint to refresh server data
    const updateUrl = 'https://pupu-formula.ssl-lolipop.jp/iidx/update.php?id=' + encodeURIComponent(id);
    fetch(updateUrl)
      .then(res => {
        if (res.status === 201) {
          // refresh successful, now fetch the actual data
          return fetch(endpointBase + encodeURIComponent(id));
        }
        // if update didn't return 201, still try to fetch data
        return fetch(endpointBase + encodeURIComponent(id));
      })
      .then(r => r.json())
      .then(json => {
        if (json && json.id) {
          localStorage.setItem('user_' + json.id, JSON.stringify(json));
          renderUserList();
        }
      })
      .catch(err => {
        console.error('取得に失敗', err);
      });
  }

  function compareSelected() {
    const checkboxes = document.querySelectorAll('#userList tbody input[type=checkbox]:checked');
    const ids = Array.from(checkboxes).map(cb=>cb.dataset.id);
    if (ids.length === 0) {
      alert('比較するユーザーを選択してください');
      return;
    }
    const users = ids.map(id => {
      try {
        return JSON.parse(localStorage.getItem('user_'+id));
      } catch(e) { return null; }
    }).filter(u=>u);

    // collect music names and prepare map for each user, also gather scores
    const musicSet = new Set();
    const scoreTotals = {}; // music -> total score
    const userMaps = users.map(u => {
      const map = {};
      const classMap = {};
      Object.values(u.data || {}).forEach(item => {
        if (item && item.music) {
          map[item.music] = item.lamp || '';
          classMap[item.music] = item.class || '';
          musicSet.add(item.music);
          const sc = parseInt(item.score, 10) || 0;
          scoreTotals[item.music] = (scoreTotals[item.music] || 0) + sc;
        }
      });
      return {name: u.name || u.id, map, classMap, cpi: u.cpi || 0, userId: u.id};
    });
    
    // Sort by CPI descending, then by userId ascending
    userMaps.sort((a, b) => {
      const cpiDiff = (b.cpi || 0) - (a.cpi || 0);
      if (cpiDiff !== 0) return cpiDiff;
      return (a.userId || 0) - (b.userId || 0);
    });
    
    const musics = Array.from(musicSet);
    musics.sort((a, b) => {
      const diff = (scoreTotals[b] || 0) - (scoreTotals[a] || 0);
      if (diff !== 0) return diff;
      return a.localeCompare(b);
    });

    const area = document.getElementById('compareArea');
    let html = '<table><thead><tr><th>曲名</th>';
    userMaps.forEach(u => { html += '<th class="player">' + u.name + '<br>' + (u.cpi || 0) + '</th>'; });
    html += '</tr></thead><tbody>';

    musics.forEach(music => {
      html += '<tr><td class="music">' + music + '</td>';
      userMaps.forEach(u => {
        const lamp = u.map[music] || '';
        const cls = u.classMap[music] || '';
        html += '<td class="' + cls + '">' + lamp + '</td>';
      });
      html += '</tr>';
    });

    html += '</tbody></table>';
    area.innerHTML = html;

    // close accordion after comparison
    toggleAccordion(false);
  }

  function toggleAccordion(open) {
    const content = document.getElementById('accordionContent');
    const header = document.getElementById('accordionHeader');
    if (open) {
      content.classList.add('open');
      header.textContent = 'ユーザー選択 ▲';
    } else {
      content.classList.remove('open');
      header.textContent = 'ユーザー選択 ▼';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderUserList();
    document.getElementById('fetchButton').addEventListener('click', () => {
      const id = document.getElementById('userIdInput').value.trim();
      if (id) fetchAndStore(id);
    });
    document.getElementById('compareButton').addEventListener('click', compareSelected);
    document.getElementById('accordionHeader').addEventListener('click', () => {
      const content = document.getElementById('accordionContent');
      const isOpen = content.classList.contains('open');
      toggleAccordion(!isOpen);
    });
  });
})();
</script>
</body>
</html>
